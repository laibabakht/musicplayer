<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Contrast Music Player</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        /* Define CSS variables for the color palette with improved contrast */
        :root {
            --main-bg-color: #586e8dd4;
            --card-color: #36393e;
            --primary-shadow-color: #232629;
            --secondary-shadow-color: #454c54;
            --accent-color: #ffb400;
            --text-color: #f0f0f0;
            --light-text-color: #a8a8a8;
        }

        body {
            background-color: var(--main-bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: var(--text-color);
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        }

        .music-player-card {
            /* Increased max-width and adjusted padding to reduce overall height */
            max-width: 500px;
            width: 90%;
            background-color: var(--card-color);
            border-radius: 2rem;
            box-shadow: 8px 8px 15px var(--primary-shadow-color), -8px -8px 15px var(--secondary-shadow-color);
            padding: 2rem;
            transition: all 0.3s ease;
            border: none;
            box-sizing: border-box;
        }

        .cover-container {
            border-radius: 50%;
            width: 200px; /* Reduced size to accommodate a shorter card */
            height: 200px;
            margin: 0 auto 1rem auto; /* Reduced margin */
            box-shadow: 8px 8px 15px var(--primary-shadow-color), -8px -8px 15px var(--secondary-shadow-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: var(--card-color);
        }

        #song-cover {
            border-radius: 50%;
            object-fit: cover;
            width: 90%;
            height: 90%;
        }

        .song-info h3 {
            color: var(--text-color);
            font-weight: 600;
        }

        .song-info p {
            color: var(--light-text-color);
        }

        .control-btn {
            background-color: var(--card-color);
            box-shadow: 5px 5px 10px var(--primary-shadow-color), -5px -5px 10px var(--secondary-shadow-color);
            transition: all 0.3s ease;
            border: none;
        }

        #play-pause-btn {
            background-color: var(--accent-color);
            box-shadow: 8px 8px 15px var(--primary-shadow-color), -8px -8px 15px var(--secondary-shadow-color);
        }

        .control-btn i {
            color: var(--text-color);
        }

        #play-pause-btn i {
            color: var(--text-color);
        }

        input[type="range"]::-webkit-slider-runnable-track {
            background: var(--card-color);
            box-shadow: inset 2px 2px 4px var(--primary-shadow-color), inset -2px -2px 4px var(--secondary-shadow-color);
            height: 6px;
            border-radius: 3px;
        }

        input[type="range"]::-webkit-slider-thumb {
            background-color: var(--accent-color);
            box-shadow: 2px 2px 4px var(--primary-shadow-color);
            transition: background-color 0.3s ease;
        }

        .list-group-item {
            background-color: var(--card-color);
            border-top: 1px solid var(--secondary-shadow-color);
            box-shadow: 2px 2px 5px var(--primary-shadow-color), -2px -2px 5px var(--secondary-shadow-color);
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            transition: all 0.3s ease;
            color: var(--text-color);
        }

        .list-group-item.active {
            background-color: var(--secondary-shadow-color);
            box-shadow: none;
            color: var(--text-color);
        }

        .list-group-item h6 {
            color: var(--text-color);
        }

        .list-group-item p {
            color: var(--light-text-color);
        }

        .playlist-scroll {
            max-height: 100px; /* Reduced max-height for no scroll */
            overflow-y: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .playlist-scroll::-webkit-scrollbar {
            display: none;
        }

        /* Adjusted media query for the new dimensions */
        @media (max-width: 550px) {
            .music-player-card {
                padding: 1.5rem;
            }

            .cover-container {
                width: 180px;
                height: 180px;
            }

            #song-cover {
                width: 160px;
                height: 160px;
            }
        }
    </style>
</head>

<body>
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card music-player-card text-center border-0 p-4">

            <div id="error-alert" class="alert alert-danger alert-dismissible fade show d-none" role="alert">
                An error occurred while loading the track. Skipping to the next song.
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="d-flex justify-content-between mb-3"> <i class="bi bi-chevron-left fs-4" style="color: var(--text-color);"></i>
                <i class="bi bi-list fs-4" style="color: var(--text-color);"></i>
            </div>

            <div class="cover-container">
                <img id="song-cover" src="https://via.placeholder.com/400" class="rounded-circle" alt="Song Cover">
            </div>

            <div class="song-info mb-2"> <h3 id="song-title">Song Title</h3>
                <p id="artist-name" class="mb-0">Artist Name</p>
            </div>

            <div class="d-flex align-items-center mb-3">
                <span id="current-time" class="small me-2" style="color: var(--light-text-color);">0:00</span>
                <input type="range" id="progress-bar" class="form-range" min="0" value="0">
                <span id="total-duration" class="small ms-2" style="color: var(--light-text-color);">0:00</span>
            </div>

            <div class="d-flex justify-content-center align-items-center mb-3"> <button id="prev-btn" class="btn rounded-circle control-btn mx-2" aria-label="Previous track">
                    <i class="bi bi-skip-backward-fill fs-5"></i>
                </button>
                <button id="play-pause-btn" class="btn rounded-circle control-btn mx-2" aria-label="Play or pause track">
                    <i id="play-pause-icon" class="bi bi-play-fill fs-3"></i>
                </button>
                <button id="next-btn" class="btn rounded-circle control-btn mx-2" aria-label="Next track">
                    <i class="bi bi-skip-forward-fill fs-5"></i>
                </button>
            </div>

            <div class="d-flex align-items-center mb-3"> <button id="mute-btn" class="btn rounded-circle control-btn" aria-label="Mute or unmute">
                    <i id="volume-icon" class="bi bi-volume-up-fill fs-5"></i>
                </button>
                <input type="range" id="volume-slider" class="form-range mx-3" min="0" max="1" step="0.01" value="1">
            </div>

            <div class="text-start mt-3"> <h5 class="mb-2">Playlist</h5> <ul id="playlist" class="list-group list-group-flush playlist-scroll">
                    </ul>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eJqfTq2d7s"
        crossorigin="anonymous"></script>

    <script src="./script.js"></script>
</body>

</html>
